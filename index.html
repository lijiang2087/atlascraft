<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas Craft</title>
    <meta name="description" content="Atlas the Titan.">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0a0c;
        }

        body {
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(201, 165, 90, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(201, 165, 90, 0.03) 1px, transparent 1px);
            background-size: 80px 80px;
            pointer-events: none;
        }

        .hero {
            position: relative;
            z-index: 1;
        }

        .hero img {
            display: block;
            max-width: 90vw;
            max-height: 90vh;
            width: auto;
            height: auto;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <div class="hero">
        <img src="atlas-titan.png" alt="Atlas the Titan" />
    </div>
</body>
</html>
